<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buddy Builder - Download</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero {
      text-align: center;
      padding: 80px 20px 40px;
      max-width: 700px;
    }

    .hero img {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      margin-bottom: 24px;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 18px;
      color: #8b949e;
      line-height: 1.6;
    }

    .install {
      max-width: 600px;
      width: 100%;
      margin: 40px auto 0;
      padding: 0 20px;
    }

    .install-step {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 16px;
    }

    .install-step h3 {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .install-cmd {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 15px;
      color: #e6edf3;
    }

    .install-cmd code {
      flex: 1;
    }

    .install-cmd .copy-btn {
      background: none;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .install-cmd .copy-btn:hover {
      color: #e6edf3;
      border-color: #58a6ff;
    }

    .prereq {
      max-width: 600px;
      margin: 24px auto 0;
      padding: 16px 20px;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 8px;
      font-size: 13px;
      color: #8b949e;
      text-align: center;
      line-height: 1.6;
    }

    .prereq strong {
      color: #e6edf3;
    }

    .prereq a {
      color: #58a6ff;
      text-decoration: none;
    }

    .footer {
      margin-top: 60px;
      padding: 20px;
      text-align: center;
      color: #484f58;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="hero">
    <img src="icon-256.png" alt="Buddy Builder">
    <h1>Buddy Builder</h1>
    <p>A desktop GUI for Claude Code. Manage multiple sessions, search conversations, and work with AI — visually.</p>
  </div>

  <div class="install">
    <div class="install-step">
      <h3>Install</h3>
      <div class="install-cmd">
        <code>npm install -g buddy-builder</code>
        <button class="copy-btn" onclick="copy(this, 'npm install -g buddy-builder')">Copy</button>
      </div>
    </div>
    <div class="install-step">
      <h3>Launch</h3>
      <div class="install-cmd">
        <code>buddy-builder</code>
        <button class="copy-btn" onclick="copy(this, 'buddy-builder')">Copy</button>
      </div>
    </div>
  </div>

  <div class="prereq">
    <strong>Prerequisites:</strong> Node.js and <a href="https://docs.anthropic.com/en/docs/claude-code" target="_blank">Claude Code CLI</a><br>
    Works on macOS, Windows, and Linux.
  </div>

  <div class="footer">
    <a href="https://github.com/BroderDigitalEnzymes/buddy-builder" target="_blank">GitHub</a>
  </div>

  <script>
    function copy(btn, text) {
      navigator.clipboard.writeText(text);
      btn.textContent = "Copied!";
      setTimeout(() => { btn.textContent = "Copy"; }, 1500);
    }
  </script>
</body>
</html>
